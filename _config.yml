        sub_title: PyTorch
        quote: >
          97.25% validation accuracy on handwritten digit classification.
        description: | # this will include new lines to allow paragraphs
          Designed and trained a **3-layer neural network** in <mark>PyTorch</mark> to classify handwritten digits from the MNIST dataset. Preprocessed data using normalization and ToTensor transformations, implemented **ReLU activation** and **Cross-Entropy Loss**, and optimized training with **SGD** (momentum=0.9), achieving a **97.25% validation accuracy**.

      - layout: top-middle
